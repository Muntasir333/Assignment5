<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues</title>

    <!-- daisy ui + tailwind css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style.css">

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<header class="bg-white w-full h-[78px] flex justify-between px-20">
<div class="flex gap-4 text-left items-center">
<img class="w-9 h-[37px]" src="./assets/github-logo.png">
<h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
</div>


<div class="flex items-center gap-4">
<div><label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues" />
</label></div>
<button class="btn btn-primary">+ New Issue</button>
</div>
</header>

<body class="bg-[#F8FAFC]">

<section class="button w-[1300px] h-[98px] mx-auto bg-white mt-[60px] flex items-center gap-4 px-6 rounded-xl">
<button id="all" class="btn btn-primary w-[120px] h-10">All</button>
<button id="open" class="btn btn-outline w-[120px] h-10">Open</button>
<button id="closed" class="btn btn-outline w-[120px] h-10">Closed</button>
</section>

<section class="count w-[1300px] h-[98px] mx-auto bg-white mt-4 flex items-center gap-4 px-6 rounded-xl ">
<div class="flex justify-between w-full">
    <div class="flex gap-2 items-center">
    <img class="w-8 h-8" src="./assets/Aperture.png">
    <div>
        <h2 id="num" class="font-semibold text-xl">0 Issues</h2>
        <p class="font-normal text-[16px] text-[#64748B]">Track and manage your project issues</p>
    </div>
    </div>
    <div class="flex gap-2">
    <div class="flex gap-1 items-center">
        <img src="./assets/Ellipse 2.png"><h2>Open</h2>
    </div>
    <div class="flex gap-1 items-center">
        <img src="./assets/Ellipse 2 (1).png"><h2>Closed</h2>
    </div>
</div>
</div>
</section>

<section id="card-Container" class="w-[1300px] mx-auto p-20  bg-[#F8FAFC] shadow-xl grid grid-cols-4 gap-6">

<div class="card w-64 h-64 border-2 px-10 space-y-3">
    <div class="front flex justify-between">
        <img src="./assets/Open-Status.png" alt="">
        <h1 class="bg-red-300 w-20 py-1 inline-block text-center rounded-xl font-medium text-[12px]">High</h1>
    </div>
    <div>
        <h2 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h2>
        <p class="font-normal text-[12px] text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices...</p>
    </div>
    <div class="flex gap-2">
        <div class="bg-red-300 w-20 text-center rounded-xl font-medium text-[12px] py-1 inline-block"><i class="fa-solid fa-bug"></i> Bug</div> <div class="bg-yellow-200 w-30 text-center rounded-xl font-medium text-[12px] py-1 inline-block"><i class="fa-regular fa-life-ring"></i>Help Wanted</div>
    </div>
    <hr>
    <div>
        <h1 class="font-normal text-[12px] text-[#64748B]"># by john</h1>
        <h1 class="font-normal text-[12px] text-[#64748B]">23.5.23</h1>
    </div>

</div>

</section>


     <script src="./error.js"></script>
</body>
</html>
